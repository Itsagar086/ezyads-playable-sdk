<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Number Match - Premium Playable Ad</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Game Stylesheet -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <div id="app-container">
    <!-- Particle canvas background -->
    <canvas id="particles-canvas"></canvas>

    <!-- Header / Stats Info -->
    <div class="header-panel">
      <div class="mission-title">Find Pairs and Sums of 10</div>
      <div class="target-title">Mission Target: 100</div>
      <div class="score-capsule" id="score-box">
        <span>Score:</span>
        <span class="score-val" id="score-label">0</span>
      </div>

      <!-- AI Performance Analyzer -->
      <div class="ai-analyzer">
        <div class="ai-badge tier-learner" id="ai-badge-tier">
          <span class="ai-dot">
            <svg id="iq-brain-svg" class="iq-normal" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="brain-grad-left" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#fbcfe8" />
                  <stop offset="100%" stop-color="#f472b6" />
                </linearGradient>
                <linearGradient id="brain-grad-right" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#f9a8d4" />
                  <stop offset="100%" stop-color="#ec4899" />
                </linearGradient>
                <filter id="brain-shadow">
                  <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#831843" flood-opacity="0.4" />
                </filter>
              </defs>
              <g filter="url(#brain-shadow)">
                <ellipse cx="38" cy="46" rx="26" ry="30" fill="url(#brain-grad-left)" stroke="#be123c"
                  stroke-width="2.5" />
                <ellipse cx="62" cy="46" rx="26" ry="30" fill="url(#brain-grad-right)" stroke="#be123c"
                  stroke-width="2.5" />
                <!-- Cerebellum -->
                <ellipse cx="50" cy="78" rx="14" ry="10" fill="#f472b6" stroke="#9f1239" stroke-width="2" />
                <rect x="45" y="75" width="10" height="12" rx="3" fill="#ec4899" stroke="#9f1239" stroke-width="2" />
                <!-- Cortex folds (Left) -->
                <path d="M22 36 Q18 28 26 24 Q32 20 34 28" fill="none" stroke="#be123c" stroke-width="2.5"
                  stroke-linecap="round" />
                <path d="M18 50 Q12 42 20 38 Q26 34 28 42" fill="none" stroke="#be123c" stroke-width="2.5"
                  stroke-linecap="round" />
                <path d="M24 64 Q18 56 24 52 Q30 48 32 56" fill="none" stroke="#be123c" stroke-width="2.5"
                  stroke-linecap="round" />
                <!-- Cortex folds (Right) -->
                <path d="M78 36 Q82 28 74 24 Q68 20 66 28" fill="none" stroke="#be123c" stroke-width="2.5"
                  stroke-linecap="round" />
                <path d="M82 50 Q88 42 80 38 Q74 34 72 42" fill="none" stroke="#be123c" stroke-width="2.5"
                  stroke-linecap="round" />
                <path d="M76 64 Q82 56 76 52 Q70 48 68 56" fill="none" stroke="#be123c" stroke-width="2.5"
                  stroke-linecap="round" />
                <!-- Center split -->
                <line x1="50" y1="18" x2="50" y2="76" stroke="#9f1239" stroke-width="3" stroke-linecap="round" />
              </g>
            </svg>
          </span>
          <!-- Fixed label + live IQ value -->
          <span style="display:flex;flex-direction:column;align-items:flex-start;gap:2px;">
            <span id="ai-tier-text"
              style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.4px;color:#10b981;display:flex;align-items:center;gap:4px;line-height:1;">
              <svg width="12" height="10" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="38" cy="46" rx="26" ry="30" fill="#f472b6" />
                <ellipse cx="62" cy="46" rx="26" ry="30" fill="#ec4899" />
              </svg>
              IQ Level
            </span>
            <span id="ai-iq-value" style="font-size:16px;font-weight:800;line-height:1;color:#064e3b;">IQ: 10</span>
          </span>
        </div>
        <div class="ai-energy-wrapper">
          <div class="ai-energy-bar" id="ai-energy-gauge"></div>
        </div>
        <div class="ai-emoji" id="ai-emoji-face">😀</div>
      </div>
    </div>


    <!-- Separator -->
    <div class="separator-line"></div>

    <!-- Gameplay grid area -->
    <div class="gameplay-area" id="gameplay-viewport">
      <!-- Grid Container -->
      <div class="board-container" id="grid-board"></div>

      <!-- SVG overlay for rendering lines -->
      <svg id="connector-svg">
        <line id="connection-line" class="connector-line" x1="0" y1="0" x2="0" y2="0" style="display:none;" />
      </svg>
    </div>

    <!-- Emotion Engine Popups Container -->
    <div class="emotion-overlay" id="emotion-layer"></div>

    <!-- Combo streak badge -->
    <div class="combo-badge-overlay" id="combo-popup">x2</div>

    <!-- Outro / CTA View -->
    <div id="cta-overlay">
      <div class="outro-card">
        <div class="outro-title">Number Match</div>

        <!-- 3x3 Board Icon (from reference Outro) -->
        <div class="icon-grid-display">
          <div class="icon-cell">4</div>
          <div class="icon-cell">2</div>
          <div class="icon-cell">4</div>
          <div class="icon-cell">9</div>
          <div class="icon-cell match-highlight">3</div>
          <div class="icon-cell match-highlight">3</div>
          <div class="icon-cell">7</div>
          <div class="icon-cell">9</div>
          <div class="icon-cell">3</div>
        </div>

        <div class="outro-badge-label" id="outro-tier-label">Math Master</div>

        <!-- Stats table -->
        <div class="stats-table">
          <div class="stat-box">
            <span class="stat-label">Final Score</span>
            <span class="stat-value" id="stat-final-score">90</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Accuracy</span>
            <span class="stat-value" id="stat-accuracy">100%</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Max Streak</span>
            <span class="stat-value" id="stat-max-combo">x5</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">XP Earned</span>
            <span class="stat-value" id="stat-xp">900 XP</span>
          </div>
        </div>

        <!-- Call to Action Main Button -->
        <button class="cta-btn shine" id="install-btn">
          <span>Install Now</span>
          <span class="cta-arrow">➔</span>
        </button>

        <div class="secondary-cta" id="continue-btn">Continue Playing</div>
      </div>
    </div>

    <!-- Footer Controls -->
    <div class="footer-panel">
      <div class="footer-info">Target Score: 100</div>
      <button class="control-btn" id="mute-btn" title="Toggle Sound">
        <!-- SVG Speaker Icon -->
        <svg id="speaker-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07" class="sound-wave"></path>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14" class="sound-wave"></path>
        </svg>
      </button>
    </div>

    <!-- Tutorial Hand overlay -->
    <div class="tutorial-hand" id="tutorial-indicator">
      <img
        src="assests/images/tutorial-hand.png.png"
        class="hand-icon"
        alt="Tutorial Hand"
      />
    </div>
  </div>

  <!-- --- JAVASCRIPT MODULES --- -->
  <script src="js/config.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/emotions.js"></script>
  <script src="js/score.js"></script>
  <script src="js/combo.js"></script>
  <script src="js/aiAnalyzer.js"></script>
  <script src="js/tutorial.js"></script>
  <script src="js/gameEngine.js"></script>
  <script src="js/playableFlow.js"></script>
  <script src="js/cta.js"></script>
  <script src="js/gameFeel.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>

</body>

</html>
